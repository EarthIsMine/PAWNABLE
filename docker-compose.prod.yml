services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pawnable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pawnable}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/earthismine/pawnable-backend:latest}
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PORT: 8085
      NODE_ENV: production
      BASE_CHAIN_ID: ${BASE_CHAIN_ID:-103}
      BASE_RPC_URL: ${BASE_RPC_URL:-https://seoul.worldland.foundation}
      LOAN_CONTRACT_ADDRESS: ${LOAN_CONTRACT_ADDRESS:-0x603010Bba307831Fa3B7dD05974511850Bcdc1c7}
    ports:
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/earthismine/pawnable-frontend:latest}
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://pawnable.site/api}
    ports:
      - "3005:3005"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
