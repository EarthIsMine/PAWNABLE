[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"

[rpc_endpoints]
worldland = "${WORLDLAND_RPC_URL}"

[etherscan]
worldland = { key = "${ETHERSCAN_API_KEY}", url = "https://scan.worldland.foundation/api" }
